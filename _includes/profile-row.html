<table width="100%" cellpadding="0" cellspacing="0" style="margin-top:15px; background:#f9f9f9; padding:10px; border-radius:6px;">
  <tr>
    
    <td width="80" valign="top" style="padding-right:10px;">
      <img src="{{ include.image | absolute_url }}"
           width="70"
           style="display:block; border-radius:4px;">
    </td>

    <td valign="top" style="font-size:14px; color:#333; line-height:1.4;">
      
      <strong style="display:block; margin-bottom:3px;">
        {{ include.name }}
      </strong>

      <div>
        {{ include.description }}
      </div>

    </td>
