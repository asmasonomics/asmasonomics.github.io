<table width="100%" cellpadding="0" cellspacing="0" style="margin-top:12px;">
  <tr>

    <td width="80" valign="top" style="padding-right:10px;">
      <img src="{{ include.image | absolute_url }}"
           width="70"
           style="display:block; border-radius:4px;">
    </td>

    <td valign="top" style="font-size:14px; line-height:1.4; color:#333;">

      <strong style="display:block; margin-bottom:3px;">
        {{ include.name }}
      </strong>

      <div>
        {{ include.line1 }}
      </div>

    </td>

  </tr>
</table>
